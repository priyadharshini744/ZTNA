<!DOCTYPE html>
<html>
<head>
<title>ZTNA Access Management System</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:500px;
margin:50px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
}

label{
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.result{
margin-top:20px;
padding:10px;
text-align:center;
font-weight:bold;
}

footer{
background:#003366;
color:white;
text-align:center;
padding:10px;
position:fixed;
bottom:0;
width:100%;
}

</style>

<script>

function verifyAccess(){

var username=document.getElementById("username").value;
var password=document.getElementById("password").value;
var device=document.getElementById("device").value;
var location=document.getElementById("location").value;

var message="";

if(username=="" || password==""){
message="Enter Username and Password";
}

else if(device!="Laptop" && device!="Desktop"){
message="Access Blocked - Untrusted Device";
}

else if(location!="Office" && location!="Campus" && location!="VPN"){
message="Access Denied - Unauthorized Location";
}

else{
message="Access Granted - Zero Trust Policy Verified";
}

document.getElementById("result").innerHTML=message;

}

</script>

</head>

<body>

<header>
<h1>Zero Trust Network Access System</h1>
<p>Implement and Manage ZTNA using Zscaler</p>
</header>

<div class="container">

<h2>User Authentication</h2>

<label>Username</label>
<input type="text" id="username">

<label>Password</label>
<input type="password" id="password">

<label>Device Type</label>
<select id="device">
<option>Select Device</option>
<option>Laptop</option>
<option>Desktop</option>
<option>Mobile</option>
<option>Tablet</option>
</select>

<label>Access Location</label>
<select id="location">
<option>Select Location</option>
<option>Office</option>
<option>Campus</option>
<option>VPN</option>
<option>Home</option>
</select>

<button onclick="verifyAccess()">Verify Access</button>

<div id="result" class="result"></div>

</div>

<footer>
<p>NM Project | ZTNA Security System</p>
</footer>

</body>
</html>
